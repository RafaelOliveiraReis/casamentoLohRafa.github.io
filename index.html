<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Upload de Mídia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white; /* Texto claro para contrastar com o fundo */
        }

        /* Camada de fundo fixa e desfocada */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./public/img/IMG_7362.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(8px) brightness(0.7); /* Reduz nitidez e brilho */
            z-index: -1;
            transform: scale(1.05); /* Remove bordas brancas do blur */
        }

        h1 {
            text-align: center;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .upload-box {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px); /* Efeito de vidro no botão */
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Container do Spinner */
        #loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin: 20px auto;
        }

        /* O círculo giratório */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #4CAF50; /* Cor do carregamento */
            animation: spin 1s ease-in-out infinite;
            -webkit-animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #status-text {
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }

        .gallery img,
        .gallery video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid white;
        }
    </style>
</head>
<body>

    <h1>📸 Ajude a eternizar nosso grande dia 💕</h1>

    <div class="upload-box">
        <input 
            type="file" 
            accept="image/*,video/*" 
            multiple 
            capture="environment"
            onchange="previewMedia(event)"
            id="guest-name"
        >
    </div>

    <div id="loader-container">
        <div class="spinner"></div>
        <p id="status-text">Iniciando upload...</p>
    </div>

    <div class="gallery" id="gallery"></div>

    <script>
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsZAPEl0PBbdzMo4pGw2HaBCaCBp4IuE8J2wivuY9oehVAPJyERyOdFaLfBn98p6PA/exec"; 
        const MAX_FILE_SIZE_MB = 50; 

        // Carrega fotos existentes ao abrir a página (doGet)
        window.onload = async () => {
            try {
                const response = await fetch(APP_SCRIPT_URL);
                const fotos = await response.json();
                if (fotos.length > 0) {
                    fotos.forEach(f => {
                        const img = document.createElement('img');
                        img.src = f.url;
                        img.style.opacity = "0.7";
                        document.getElementById('gallery').appendChild(img);
                    });
                }
            } catch (e) { console.log("Sem fotos prévias."); }
        };


        async function previewMedia(event) {
            const files = event.target.files;
            const guestName = document.getElementById('guest-name').value || "Convidado";
            const loaderContainer = document.getElementById('loader-container');
            const statusText = document.getElementById('status-text');
            
            if (files.length > 0) loaderContainer.style.display = 'flex';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const fileSizeMB = file.size / (1024 * 1024);

                if (fileSizeMB > MAX_FILE_SIZE_MB) {
                    alert(`O arquivo "${file.name}" é muito grande (${fileSizeMB.toFixed(1)}MB). Limite: ${MAX_FILE_SIZE_MB}MB.`);
                    continue; 
                }

                statusText.innerText = `Enviando ${i + 1} de ${files.length}: ${file.name}`;
                
                const url = URL.createObjectURL(file);
                renderizarNaGaleria(file, url);

                try {
                    await enviarParaGoogleDrive(file, guestName);
                } catch (error) {
                    console.error("Erro no arquivo:", file.name);
                }
            }
            
            statusText.innerText = "✅ Finalizado!";
            setTimeout(() => { loaderContainer.style.display = 'none'; }, 3000);
        }


        function enviarParaGoogleDrive(file, guestName) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function () {
                    const base64Data = reader.result.split(',')[1];
                    fetch(APP_SCRIPT_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            base64: base64Data,
                            type: file.type,
                            name: `${guestName}_${Date.now()}_${file.name}`,
                            guest: guestName
                        })
                    })
                    .then(res => res.json())
                    .then(data => resolve(data))
                    .catch(err => reject(err));
                };
            });
        }


        function renderizarNaGaleria(file, url) {
            const gallery = document.getElementById('gallery');
            const isVideo = file.type.startsWith('video');
            const elemento = isVideo ? document.createElement('video') : document.createElement('img');
            
            elemento.src = url;

            if (isVideo) {
                elemento.controls = true;
                elemento.autoplay = true;
                elemento.muted = true;
                elemento.loop = true;
                elemento.setAttribute('playsinline', ''); 
            }

            gallery.prepend(elemento); // Adiciona no topo da galeria
        }
        
    </script>


</body>
</html>
